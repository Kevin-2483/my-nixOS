[[manager.prepend_keymap]]
on   = [ "b", "r" ]
run  = 'plugin mactag --args="add Red"'
desc = "Tag selected files with red"

[[manager.prepend_keymap]]
on   = [ "b", "R" ]
run  = 'plugin mactag --args="remove Red"'
desc = "Remove red tag from selected files"

